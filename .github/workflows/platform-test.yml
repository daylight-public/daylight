name: platform-detection-test
on: [workflow_dispatch]
jobs:
  detect:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            expected_platform: linux-amd64
            expected_runner: linux-x64
          - os: ubuntu-24.04-arm
            expected_platform: linux-arm64
            expected_runner: linux-arm64
          - os: macos-13
            expected_platform: darwin-amd64
            expected_runner: osx-x64
          - os: macos-14
            expected_platform: darwin-arm64
            expected_runner: osx-arm64
          - os: windows-latest
            expected_platform: windows-amd64
            expected_runner: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install modern bash on macOS
        if: runner.os == 'macOS'
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install bash
      - name: Install jq on Windows
        if: runner.os == 'Windows'
        run: choco install jq -y
      - name: test platform detection
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then BASH=$(brew --prefix)/bin/bash; else BASH=bash; fi
          $BASH -e << 'EOF'
          source daylight.sh
          p=$(detect-platform)
          r=$(detect-runner-platform)
          [[ "$p" == "${{ matrix.expected_platform }}" ]] || { echo "MISMATCH: detect-platform=$p, expected=${{ matrix.expected_platform }}"; exit 1; }
          [[ "$r" == "${{ matrix.expected_runner }}" ]] || { echo "MISMATCH: detect-runner-platform=$r, expected=${{ matrix.expected_runner }}"; exit 1; }
          echo "PASS: $p / $r"
          EOF
      - name: debug curl + test download-dylt smoke
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then BASH=$(brew --prefix)/bin/bash; else BASH=bash; fi
          # Debug: check curl version and test GitHub API
          echo "=== curl version ==="
          curl --version | head -1
          echo "=== test github API ==="
          curl --fail-with-body --location --silent \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/dylt-dev/dylt/releases/latest \
            > /tmp/api-test.json 2>&1
          echo "exit=$?"
          head -c 200 /tmp/api-test.json
          echo
          echo "=== test new-style download URL ==="
          TAG=$(jq -r .tag_name /tmp/api-test.json)
          echo "latest tag: $TAG"
          curl --fail --location --head \
            "https://github.com/dylt-dev/dylt/releases/download/$TAG/dylt_$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')".tar.gz \
            > /dev/null 2>&1 && echo "NEW URL EXISTS" || echo "NEW URL MISSING"
          # If Windows, set CA bundle for git bash curl
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            export CURL_CA_BUNDLE="C:/Program Files/Git/mingw64/ssl/certs/ca-bundle.crt"
            export SSL_CERT_FILE="C:/Program Files/Git/mingw64/ssl/certs/ca-bundle.crt"
          fi
          $BASH -e << 'EOF'
          source daylight.sh
          TMP=$(mktemp -d)
          download-dylt "$TMP"
          ls -la "$TMP"
          rm -rf "$TMP"
          EOF
      - name: test etcd url construction
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then BASH=$(brew --prefix)/bin/bash; else BASH=bash; fi
          $BASH -e << 'EOF'
          source daylight.sh
          url=$(etcd-create-download-url)
          echo "URL: $url"
          [[ -n "$url" ]] || { echo "EMPTY URL"; exit 1; }
          http_code=$(curl --fail --location --head --silent --output /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "FAIL")
          echo "HTTP: $http_code"
          [[ "$http_code" == "200" ]] || { echo "URL not reachable (HTTP $http_code) — may be transient, not failing"; }
          EOF

  linux-arm32:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU for ARM32
        run: docker run --rm --privileged tonistiigi/binfmt --install arm
      - name: test ARM32 via QEMU
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v $PWD:/repo \
            arm32v7/ubuntu bash -c "
              apt-get update -qq && apt-get install -y -qq curl >/dev/null 2>&1
              source /repo/daylight.sh
              p=\$(detect-platform)
              r=\$(detect-runner-platform)
              [[ \"\$p\" == \"linux-arm\" ]] || { echo \"MISMATCH: detect-platform=\$p, expected=linux-arm\"; exit 1; }
              [[ \"\$r\" == \"linux-arm\" ]] || { echo \"MISMATCH: detect-runner-platform=\$r, expected=linux-arm\"; exit 1; }
              echo \"PASS: \$p / \$r\"
            "

